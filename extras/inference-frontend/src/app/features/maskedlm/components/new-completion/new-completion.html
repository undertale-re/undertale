<div class="new-completion-form w-100" style="max-width: 600px">
  <h4 class="mb-3">New Completion</h4>
  <p class="text-muted mb-3">
    Enter assembly with <code>[MASK]</code> tokens. The model will predict the masked tokens.
  </p>
  <form (ngSubmit)="submit()">
    <div class="mb-3">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label for="input" class="form-label mb-0">Input Text</label>
        <button
          type="button"
          class="btn btn-link btn-sm p-0 text-muted"
          (click)="showFormatModal.set(true)"
        >
          <i class="fa-regular fa-circle-question me-1"></i>Assembly Format
        </button>
      </div>
      <textarea
        id="input"
        class="form-control"
        rows="5"
        placeholder="push [MASK]
mov rbx 42
add rax rbx
pop [MASK]
ret"
        [ngModel]="input()"
        (ngModelChange)="input.set($event)"
        name="input"
        required
      ></textarea>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="submitting() || !input().trim()">
      @if (submitting()) {
        <span class="spinner-border spinner-border-sm me-2"></span>
      }
      Submit
    </button>
  </form>
</div>

@if (showFormatModal()) {
  <app-assembly-format-modal (dismissed)="showFormatModal.set(false)" />
}
