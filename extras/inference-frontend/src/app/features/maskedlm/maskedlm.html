<div class="maskedlm-layout d-flex h-100">
  @if (showSidebar()) {
    <div class="sidebar-backdrop d-md-none" (click)="closeSidebar()"></div>
  }
  <app-sidebar class="sidebar-panel border-end" [class.open]="showSidebar()" />
  <main class="flex-grow-1 d-flex justify-content-center overflow-auto p-4">
    <button
      class="sidebar-toggle btn btn-outline-secondary btn-sm d-md-none position-absolute top-0 start-0 m-2"
      type="button"
      (click)="toggleSidebar()"
    >
      <i class="fa fa-bars"></i>
    </button>
    <div class="my-auto">
      @if (completionService.selected() === null) {
        <app-new-completion />
      } @else {
        <app-completion-detail />
      }
    </div>
  </main>
</div>
